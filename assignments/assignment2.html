<!DOCTYPE html>
<html>
<head>
	<title>VueJS</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<link rel="stylesheet" type="text/css" href="">
	<script type="text/javascript" src="vue.js"></script>
</head>
<body>
<div id="app">
	<!-- $event is vuejs reserved word. event object -->
	<button v-on:click="showAlert">Show Alert</button>
	<p>
		<input type="text" v-on:keyup="getKeyValue" v-bind:value="keyValueStr">
	</p>
	<p>
		{{ keyValueStr }}
	</p>
</div>	
<script>
	new Vue({
		el: '#app',
		data: {
			keyValueStr: "",
			iValue: ""
		},
		methods: {
			getKeyValue: function(e) {
				switch (e.key)
				{
					case "Enter":
						this.keyValueStr = "";
						break;

					default:
						this.keyValueStr = e.target.value;
						break;
				}
				
			},
			showAlert: function(e) {
				alert("Here I am");
			}
		}
	})
</script>
</body>
</html>
